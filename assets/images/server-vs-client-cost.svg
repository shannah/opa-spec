<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="sc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="sc-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="sc-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="sc-red" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="sc-green" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0.8"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#sc-bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">Server vs. Client Cost Model</text>
  <line x1="260" y1="48" x2="540" y2="48" stroke="url(#sc-purple)" stroke-width="2" opacity="0.6"/>

  <!-- Left panel: Server-Side (expensive) -->
  <g transform="translate(200, 220)">
    <text x="0" y="-135" text-anchor="middle" fill="#ef4444" font-size="14" font-weight="700" letter-spacing="1">SERVER-SIDE AI</text>
    <text x="0" y="-118" text-anchor="middle" fill="#94a3b8" font-size="10">Cost scales with every user</text>

    <!-- Chart area -->
    <rect x="-150" y="-105" width="300" height="200" rx="10" fill="#1e1530" stroke="rgba(239,68,68,0.3)" stroke-width="1"/>

    <!-- Y-axis label -->
    <text x="-140" y="-50" text-anchor="middle" fill="#94a3b8" font-size="8" transform="rotate(-90, -140, -10)">COST</text>

    <!-- X-axis label -->
    <text x="0" y="108" text-anchor="middle" fill="#94a3b8" font-size="8">USERS</text>

    <!-- Grid lines -->
    <g stroke="rgba(255,255,255,0.05)" stroke-width="0.5">
      <line x1="-130" y1="-80" x2="135" y2="-80"/>
      <line x1="-130" y1="-40" x2="135" y2="-40"/>
      <line x1="-130" y1="0" x2="135" y2="0"/>
      <line x1="-130" y1="40" x2="135" y2="40"/>
    </g>

    <!-- Rising cost line (exponential-ish) -->
    <polyline points="-120,75 -80,60 -40,35 0,0 40,-35 80,-60 120,-85" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Area under line -->
    <polygon points="-120,75 -80,60 -40,35 0,0 40,-35 80,-60 120,-85 120,80 -120,80" fill="url(#sc-red)" opacity="0.3"/>

    <!-- Cost labels -->
    <text x="100" y="-75" fill="#ef4444" font-size="9" font-weight="600">$$$</text>

    <!-- Dollar icons showing increasing cost -->
    <text x="-100" y="65" text-anchor="middle" fill="#ef4444" font-size="12" opacity="0.4">$</text>
    <text x="-40" y="45" text-anchor="middle" fill="#ef4444" font-size="14" opacity="0.5">$$</text>
    <text x="30" y="20" text-anchor="middle" fill="#ef4444" font-size="16" opacity="0.6">$$$</text>
    <text x="100" y="-10" text-anchor="middle" fill="#ef4444" font-size="18" opacity="0.7">$$$$</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(400, 200)">
    <circle r="20" fill="#1e1530" stroke="url(#sc-purple)" stroke-width="2"/>
    <text x="0" y="5" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="700">VS</text>
  </g>

  <!-- Right panel: OPA (flat cost) -->
  <g transform="translate(600, 220)">
    <text x="0" y="-135" text-anchor="middle" fill="#10b981" font-size="14" font-weight="700" letter-spacing="1">OPA APPROACH</text>
    <text x="0" y="-118" text-anchor="middle" fill="#94a3b8" font-size="10">Distribute once, users run locally</text>

    <!-- Chart area -->
    <rect x="-150" y="-105" width="300" height="200" rx="10" fill="#1e1530" stroke="rgba(16,185,129,0.3)" stroke-width="1"/>

    <!-- Y-axis label -->
    <text x="-140" y="-50" text-anchor="middle" fill="#94a3b8" font-size="8" transform="rotate(-90, -140, -10)">COST</text>

    <!-- X-axis label -->
    <text x="0" y="108" text-anchor="middle" fill="#94a3b8" font-size="8">USERS</text>

    <!-- Grid lines -->
    <g stroke="rgba(255,255,255,0.05)" stroke-width="0.5">
      <line x1="-130" y1="-80" x2="135" y2="-80"/>
      <line x1="-130" y1="-40" x2="135" y2="-40"/>
      <line x1="-130" y1="0" x2="135" y2="0"/>
      <line x1="-130" y1="40" x2="135" y2="40"/>
    </g>

    <!-- Flat cost line -->
    <line x1="-120" y1="50" x2="120" y2="50" stroke="#10b981" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Area under line -->
    <rect x="-120" y="50" width="240" height="30" fill="url(#sc-green)" opacity="0.3"/>

    <!-- Cost label -->
    <text x="100" y="42" fill="#10b981" font-size="9" font-weight="600">$</text>

    <!-- "Free for provider" annotation -->
    <text x="0" y="-20" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600" opacity="0.8">Near-zero marginal cost</text>
    <text x="0" y="-5" text-anchor="middle" fill="#94a3b8" font-size="9">Users pay with own AI</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(400, 380)">
    <rect x="-300" y="-14" width="600" height="28" rx="14" fill="#1e1530" stroke="url(#sc-purple)" stroke-width="1" opacity="0.5"/>
    <text x="-150" y="4" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="600">Server: Cost ~ O(n) per user</text>
    <text x="150" y="4" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">OPA: Cost ~ O(1) distribute once</text>
  </g>
</svg>