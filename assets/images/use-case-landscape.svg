<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="uc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="uc-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="uc-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>

  <rect width="800" height="380" fill="url(#uc-bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">OPA Use Case Landscape</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="url(#uc-purple)" stroke-width="2" opacity="0.6"/>

  <!-- Row 1: 3 cards -->
  <!-- Code Review -->
  <g transform="translate(155, 140)">
    <rect x="-115" y="-55" width="230" height="110" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="-115" y="-55" width="230" height="110" rx="12" fill="#7c3aed" opacity="0.05"/>
    <text x="-60" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="32">💻</text>
    <text x="30" y="-18" fill="#e2e8f0" font-size="13" font-weight="700">Code Review</text>
    <text x="30" y="-2" fill="#94a3b8" font-size="9">PR diffs + coding standards</text>
    <text x="30" y="12" fill="#94a3b8" font-size="9">+ review guidelines</text>
    <text x="0" y="38" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">Dev chooses their own model</text>
  </g>

  <!-- Compliance Audits -->
  <g transform="translate(400, 140)">
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#06b6d4" opacity="0.05"/>
    <text x="-55" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="32">⚖️</text>
    <text x="25" y="-18" fill="#e2e8f0" font-size="13" font-weight="700">Compliance</text>
    <text x="25" y="-2" fill="#94a3b8" font-size="9">Financial records +</text>
    <text x="25" y="12" fill="#94a3b8" font-size="9">regulatory requirements</text>
    <text x="0" y="38" text-anchor="middle" fill="#67e8f9" font-size="8" font-weight="600">Data stays on-premise</text>
  </g>

  <!-- Support Diagnostics -->
  <g transform="translate(645, 140)">
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#7c3aed" opacity="0.05"/>
    <text x="-55" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="32">🔧</text>
    <text x="25" y="-18" fill="#e2e8f0" font-size="13" font-weight="700">Diagnostics</text>
    <text x="25" y="-2" fill="#94a3b8" font-size="9">System logs + config +</text>
    <text x="25" y="12" fill="#94a3b8" font-size="9">diagnostic prompts</text>
    <text x="0" y="38" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">No log uploads needed</text>
  </g>

  <!-- Row 2: 3 cards -->
  <!-- Research -->
  <g transform="translate(155, 280)">
    <rect x="-115" y="-55" width="230" height="110" rx="12" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="-115" y="-55" width="230" height="110" rx="12" fill="#06b6d4" opacity="0.05"/>
    <text x="-60" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="32">🔬</text>
    <text x="30" y="-18" fill="#e2e8f0" font-size="13" font-weight="700">Research</text>
    <text x="30" y="-2" fill="#94a3b8" font-size="9">Datasets + analysis</text>
    <text x="30" y="12" fill="#94a3b8" font-size="9">methodology</text>
    <text x="0" y="38" text-anchor="middle" fill="#67e8f9" font-size="8" font-weight="600">Reproducible results</text>
  </g>

  <!-- Financial Reports -->
  <g transform="translate(400, 280)">
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#7c3aed" opacity="0.05"/>
    <text x="-55" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="32">📈</text>
    <text x="25" y="-18" fill="#e2e8f0" font-size="13" font-weight="700">Financial</text>
    <text x="25" y="-2" fill="#94a3b8" font-size="9">Statements + analysis</text>
    <text x="25" y="12" fill="#94a3b8" font-size="9">templates</text>
    <text x="0" y="38" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">Sensitive data protected</text>
  </g>

  <!-- Medical Records -->
  <g transform="translate(645, 280)">
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <rect x="-105" y="-55" width="210" height="110" rx="12" fill="#06b6d4" opacity="0.05"/>
    <text x="-55" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="32">🏥</text>
    <text x="25" y="-18" fill="#e2e8f0" font-size="13" font-weight="700">Medical</text>
    <text x="25" y="-2" fill="#94a3b8" font-size="9">Patient records +</text>
    <text x="25" y="12" fill="#94a3b8" font-size="9">clinical analysis</text>
    <text x="0" y="38" text-anchor="middle" fill="#67e8f9" font-size="8" font-weight="600">HIPAA-friendly local exec</text>
  </g>
</svg>