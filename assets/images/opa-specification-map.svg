<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">OPA Specification Map</text>
  <line x1="290" y1="50" x2="510" y2="50" stroke="url(#purple-glow)" stroke-width="2" opacity="0.6"/>

  <!-- Central OPA node -->
  <g transform="translate(400, 190)" filter="url(#glow)">
    <circle r="50" fill="#1e1530" stroke="url(#purple-glow)" stroke-width="2.5"/>
    <circle r="50" fill="#7c3aed" opacity="0.12"/>
    <text x="0" y="-10" text-anchor="middle" fill="#e2e8f0" font-size="15" font-weight="700">OPA</text>
    <text x="0" y="8" text-anchor="middle" fill="#a78bfa" font-size="10">Archive</text>
    <text x="0" y="22" text-anchor="middle" fill="#67e8f9" font-size="9">.opa</text>
  </g>

  <!-- Connecting lines (drawn behind nodes) -->
  <g stroke="#7c3aed" stroke-width="1" opacity="0.25">
    <!-- To File Format -->
    <line x1="355" y1="165" x2="140" y2="105"/>
    <!-- To Manifest -->
    <line x1="375" y1="145" x2="310" y2="105"/>
    <!-- To Prompt File -->
    <line x1="425" y1="145" x2="490" y2="105"/>
    <!-- To Session History -->
    <line x1="445" y1="165" x2="660" y2="105"/>
    <!-- To Data Assets -->
    <line x1="355" y1="215" x2="140" y2="320"/>
    <!-- To Execution Model -->
    <line x1="375" y1="235" x2="310" y2="320"/>
    <!-- To Extensions -->
    <line x1="425" y1="235" x2="490" y2="320"/>
    <!-- To Security -->
    <line x1="445" y1="215" x2="660" y2="320"/>
  </g>

  <!-- Top row: File Format, Manifest, Prompt, Session -->
  <!-- File Format -->
  <g transform="translate(140, 95)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">📁 File Format</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">ZIP container · paths</text>
  </g>

  <!-- Manifest -->
  <g transform="translate(310, 95)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">📋 Manifest</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">MANIFEST.MF fields</text>
  </g>

  <!-- Prompt File -->
  <g transform="translate(490, 95)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">📝 Prompt File</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">Format · templates</text>
  </g>

  <!-- Session History -->
  <g transform="translate(660, 95)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">💬 Session History</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">history.json schema</text>
  </g>

  <!-- Bottom row: Data Assets, Execution, Extensions, Security -->
  <!-- Data Assets -->
  <g transform="translate(140, 320)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">💾 Data Assets</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">data/ dir · INDEX.json</text>
  </g>

  <!-- Execution Model -->
  <g transform="translate(310, 320)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">⚙️ Execution</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">Modes · env vars</text>
  </g>

  <!-- Extensions -->
  <g transform="translate(490, 320)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">🔌 Extensions</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">Namespaces · files</text>
  </g>

  <!-- Security -->
  <g transform="translate(660, 320)">
    <rect x="-68" y="-25" width="136" height="50" rx="10" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-4" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">🔐 Security</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">Signing · sandboxing</text>
  </g>

  <!-- Version badge -->
  <g transform="translate(400, 420)">
    <rect x="-80" y="-14" width="160" height="28" rx="14" fill="#1e1530" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">v0.1.0 — Draft</text>
  </g>
</svg>