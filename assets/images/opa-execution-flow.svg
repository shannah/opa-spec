<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7c3aed" opacity="0.7"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="380" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">OPA Execution Flow</text>
  <line x1="300" y1="48" x2="500" y2="48" stroke="url(#purple-glow)" stroke-width="2" opacity="0.6"/>

  <!-- Step 1: Validate -->
  <g transform="translate(80, 140)">
    <circle r="32" fill="#1e1530" stroke="#7c3aed" stroke-width="2"/>
    <circle r="32" fill="#7c3aed" opacity="0.1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">STEP 1</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="18">✅</text>
    <text x="0" y="52" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Validate</text>
    <text x="0" y="65" text-anchor="middle" fill="#94a3b8" font-size="8">ZIP integrity</text>
    <text x="0" y="76" text-anchor="middle" fill="#94a3b8" font-size="8">Manifest check</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="118" y1="140" x2="172" y2="140" stroke="#7c3aed" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 2: Extract -->
  <g transform="translate(210, 140)">
    <circle r="32" fill="#1e1530" stroke="#7c3aed" stroke-width="2"/>
    <circle r="32" fill="#7c3aed" opacity="0.1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">STEP 2</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="18">📂</text>
    <text x="0" y="52" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Extract</text>
    <text x="0" y="65" text-anchor="middle" fill="#94a3b8" font-size="8">Isolated env</text>
    <text x="0" y="76" text-anchor="middle" fill="#94a3b8" font-size="8">Path safety</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="248" y1="140" x2="302" y2="140" stroke="#7c3aed" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 3: Resolve -->
  <g transform="translate(340, 140)">
    <circle r="32" fill="#1e1530" stroke="#06b6d4" stroke-width="2"/>
    <circle r="32" fill="#06b6d4" opacity="0.1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700">STEP 3</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="18">📝</text>
    <text x="0" y="52" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Resolve</text>
    <text x="0" y="65" text-anchor="middle" fill="#94a3b8" font-size="8">Prompt file</text>
    <text x="0" y="76" text-anchor="middle" fill="#94a3b8" font-size="8">Session history</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="378" y1="140" x2="432" y2="140" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Construct -->
  <g transform="translate(470, 140)">
    <circle r="32" fill="#1e1530" stroke="#06b6d4" stroke-width="2"/>
    <circle r="32" fill="#06b6d4" opacity="0.1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700">STEP 4</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="18">🔧</text>
    <text x="0" y="52" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Construct</text>
    <text x="0" y="65" text-anchor="middle" fill="#94a3b8" font-size="8">Agent context</text>
    <text x="0" y="76" text-anchor="middle" fill="#94a3b8" font-size="8">System + history</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="508" y1="140" x2="562" y2="140" stroke="#7c3aed" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Invoke -->
  <g transform="translate(600, 140)">
    <circle r="32" fill="#1e1530" stroke="#7c3aed" stroke-width="2"/>
    <circle r="32" fill="#7c3aed" opacity="0.1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">STEP 5</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="18">🤖</text>
    <text x="0" y="52" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Invoke</text>
    <text x="0" y="65" text-anchor="middle" fill="#94a3b8" font-size="8">AI agent</text>
    <text x="0" y="76" text-anchor="middle" fill="#94a3b8" font-size="8">Execute task</text>
  </g>

  <!-- Arrow 5→6 -->
  <line x1="638" y1="140" x2="692" y2="140" stroke="#7c3aed" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)"/>

  <!-- Step 6: Provide Data -->
  <g transform="translate(730, 140)">
    <circle r="32" fill="#1e1530" stroke="#06b6d4" stroke-width="2"/>
    <circle r="32" fill="#06b6d4" opacity="0.1"/>
    <text x="0" y="-5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700">STEP 6</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="18">💾</text>
    <text x="0" y="52" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Data</text>
    <text x="0" y="65" text-anchor="middle" fill="#94a3b8" font-size="8">data/ directory</text>
    <text x="0" y="76" text-anchor="middle" fill="#94a3b8" font-size="8">Filesystem access</text>
  </g>

  <!-- Execution modes bar -->
  <g transform="translate(400, 310)">
    <rect x="-310" y="-28" width="620" height="56" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <text x="0" y="-10" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600" letter-spacing="2">EXECUTION MODES</text>
    <text x="-180" y="14" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">💬 Interactive</text>
    <text x="0" y="14" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">📋 Batch</text>
    <text x="180" y="14" text-anchor="middle" fill="#a78bfa" font-size="11" font-weight="600">🔄 Autonomous</text>
  </g>

  <!-- Env vars hint -->
  <text x="400" y="365" text-anchor="middle" fill="#64748b" font-size="9">OPA_VERSION · OPA_ARCHIVE_NAME · OPA_EXTRACTED_ROOT · OPA_DATA_ROOT · OPA_OUTPUT_ROOT · OPA_EXECUTION_MODE</text>
</svg>