<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="440" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">OPA Architecture Overview</text>
  <line x1="270" y1="48" x2="530" y2="48" stroke="url(#purple-glow)" stroke-width="2" opacity="0.6"/>

  <!-- Main archive box -->
  <g transform="translate(400, 230)">
    <!-- Outer container -->
    <rect x="-330" y="-140" width="660" height="280" rx="16" fill="#1e1530" stroke="#7c3aed" stroke-width="2" opacity="0.8"/>
    <rect x="-330" y="-140" width="660" height="280" rx="16" fill="#7c3aed" opacity="0.04"/>

    <!-- Archive label -->
    <text x="0" y="-118" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700" letter-spacing="2">📦 sales-summary.opa</text>

    <!-- META-INF/MANIFEST.MF -->
    <g transform="translate(-210, -60)">
      <rect x="-90" y="-40" width="180" height="80" rx="10" fill="#1a1030" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="0" y="-16" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">META-INF/</text>
      <text x="0" y="0" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">📋 MANIFEST.MF</text>
      <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="8">OPA-Version: 0.1</text>
      <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="8">Execution-Mode</text>
    </g>

    <!-- prompt.md -->
    <g transform="translate(10, -60)">
      <rect x="-90" y="-40" width="180" height="80" rx="10" fill="#1a1030" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="0" y="-16" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700">ROOT</text>
      <text x="0" y="0" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">📝 prompt.md</text>
      <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="8">Primary instruction</text>
      <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="8">for the AI agent</text>
    </g>

    <!-- session/ -->
    <g transform="translate(-120, 70)">
      <rect x="-90" y="-40" width="180" height="80" rx="10" fill="#1a1030" stroke="#06b6d4" stroke-width="1.5"/>
      <text x="0" y="-16" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700">session/</text>
      <text x="0" y="0" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">💬 history.json</text>
      <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="8">Conversation context</text>
      <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="8">+ attachments/</text>
    </g>

    <!-- data/ -->
    <g transform="translate(120, 70)">
      <rect x="-90" y="-40" width="180" height="80" rx="10" fill="#1a1030" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="0" y="-16" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700">data/</text>
      <text x="0" y="0" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">💾 Assets</text>
      <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="8">CSV, XLSX, images</text>
      <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="8">INDEX.json</text>
    </g>

    <!-- SIGNATURE block (top right corner) -->
    <g transform="translate(240, -60)">
      <rect x="-60" y="-40" width="120" height="80" rx="10" fill="#1a1030" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,3"/>
      <text x="0" y="-10" text-anchor="middle" fill="#a78bfa" font-size="18">🔐</text>
      <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-size="9" font-weight="600">Signature</text>
      <text x="0" y="24" text-anchor="middle" fill="#64748b" font-size="8">(optional)</text>
    </g>
  </g>

  <!-- ZIP badge -->
  <g transform="translate(400, 410)">
    <rect x="-120" y="-14" width="240" height="28" rx="14" fill="#1e1530" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">ZIP-based · JAR-compatible · application/vnd.opa+zip</text>
  </g>
</svg>