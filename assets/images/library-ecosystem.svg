<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">Library Ecosystem</text>
  <line x1="310" y1="50" x2="490" y2="50" stroke="url(#purple-glow)" stroke-width="2" opacity="0.6"/>

  <!-- Central OPA hub -->
  <g transform="translate(400, 160)" filter="url(#glow)">
    <circle r="55" fill="#1e1530" stroke="url(#purple-glow)" stroke-width="2.5"/>
    <circle r="55" fill="#7c3aed" opacity="0.1"/>
    <text x="0" y="-12" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">OPA</text>
    <text x="0" y="6" text-anchor="middle" fill="#a78bfa" font-size="10">Spec</text>
    <text x="0" y="22" text-anchor="middle" fill="#67e8f9" font-size="9">v0.1.0</text>
  </g>

  <!-- Language nodes positioned around the hub -->
  <!-- Java -->
  <g transform="translate(140, 110)">
    <line x1="60" y1="30" x2="345" y2="155" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">☕ Java</text>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-size="9">opa-core</text>
    <text x="0" y="22" text-anchor="middle" fill="#22d3ee" font-size="8">Maven · Java 11+</text>
  </g>

  <!-- JavaScript -->
  <g transform="translate(660, 110)">
    <line x1="-60" y1="30" x2="-255" y2="155" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">⚡ JavaScript</text>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-size="9">opa-js</text>
    <text x="0" y="22" text-anchor="middle" fill="#22d3ee" font-size="8">npm · Browser/Node</text>
  </g>

  <!-- Python -->
  <g transform="translate(100, 250)">
    <line x1="60" y1="-20" x2="345" y2="70" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">🐍 Python</text>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-size="9">opa-archive</text>
    <text x="0" y="22" text-anchor="middle" fill="#22d3ee" font-size="8">PyPI · Zero deps</text>
  </g>

  <!-- PHP -->
  <g transform="translate(700, 250)">
    <line x1="-60" y1="-20" x2="-255" y2="70" stroke="#06b6d4" stroke-width="1" opacity="0.3"/>
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">🐘 PHP</text>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-size="9">opa-php</text>
    <text x="0" y="22" text-anchor="middle" fill="#22d3ee" font-size="8">Composer · PHP 8.1+</text>
  </g>

  <!-- Ruby -->
  <g transform="translate(400, 280)">
    <line x1="0" y1="-30" x2="0" y2="85" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <rect x="-60" y="-30" width="120" height="60" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-6" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="600">💎 Ruby</text>
    <text x="0" y="10" text-anchor="middle" fill="#94a3b8" font-size="9">opa-ruby</text>
    <text x="0" y="22" text-anchor="middle" fill="#22d3ee" font-size="8">RubyGems · Zero deps</text>
  </g>

  <!-- Capabilities bar at bottom -->
  <g transform="translate(400, 385)">
    <rect x="-340" y="-20" width="680" height="40" rx="20" fill="#1e1530" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="-220" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">📦 Create</text>
    <text x="-100" y="5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">📖 Read</text>
    <text x="10" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">✍️ Sign</text>
    <text x="120" y="5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">✅ Verify</text>
    <text x="240" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">⚖️ MIT License</text>
  </g>
</svg>