<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#7c3aed" opacity="0.7"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7" fill="#06b6d4" opacity="0.7"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="350" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">How OPA Runner Works</text>
  <line x1="280" y1="48" x2="520" y2="48" stroke="url(#purple-glow)" stroke-width="2" opacity="0.6"/>

  <!-- Step 1: OPA File -->
  <g transform="translate(100, 160)">
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#1e1530" stroke="#7c3aed" stroke-width="2"/>
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#7c3aed" opacity="0.08"/>
    <text x="0" y="-20" text-anchor="middle" fill="#e2e8f0" font-size="30">📄</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">.opa File</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="9">Double-click</text>
    <text x="0" y="40" text-anchor="middle" fill="#94a3b8" font-size="9">to open</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="160" x2="230" y2="160" stroke="#7c3aed" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
  <text x="200" y="148" text-anchor="middle" fill="#7c3aed" font-size="8" opacity="0.6">OPEN</text>

  <!-- Step 2: Extraction -->
  <g transform="translate(300, 160)">
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#1e1530" stroke="#06b6d4" stroke-width="2"/>
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#06b6d4" opacity="0.08"/>
    <text x="0" y="-20" text-anchor="middle" fill="#e2e8f0" font-size="30">📂</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Extraction</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="9">Unzip &amp; validate</text>
    <text x="0" y="40" text-anchor="middle" fill="#94a3b8" font-size="9">Parse manifest</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="370" y1="160" x2="430" y2="160" stroke="#06b6d4" stroke-width="2" opacity="0.5" marker-end="url(#arrow-cyan)"/>
  <text x="400" y="148" text-anchor="middle" fill="#06b6d4" font-size="8" opacity="0.6">DEPLOY</text>

  <!-- Step 3: Container -->
  <g transform="translate(500, 160)">
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#1e1530" stroke="#7c3aed" stroke-width="2"/>
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#7c3aed" opacity="0.08"/>
    <text x="0" y="-20" text-anchor="middle" fill="#e2e8f0" font-size="30">🐳</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Container</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="9">Sandboxed env</text>
    <text x="0" y="40" text-anchor="middle" fill="#94a3b8" font-size="9">Isolated execution</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="570" y1="160" x2="630" y2="160" stroke="#7c3aed" stroke-width="2" opacity="0.5" marker-end="url(#arrow)"/>
  <text x="600" y="148" text-anchor="middle" fill="#7c3aed" font-size="8" opacity="0.6">INVOKE</text>

  <!-- Step 4: AI Agent -->
  <g transform="translate(700, 160)">
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#1e1530" stroke="#06b6d4" stroke-width="2"/>
    <rect x="-65" y="-55" width="130" height="110" rx="14" fill="#06b6d4" opacity="0.08"/>
    <text x="0" y="-20" text-anchor="middle" fill="#e2e8f0" font-size="30">🤖</text>
    <text x="0" y="10" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">AI Agent</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="9">Executes prompt</text>
    <text x="0" y="40" text-anchor="middle" fill="#94a3b8" font-size="9">With data access</text>
  </g>

  <!-- Platform badges -->
  <g transform="translate(400, 310)">
    <rect x="-250" y="-18" width="500" height="36" rx="18" fill="#1e1530" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
    <text x="-140" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">🪟 Windows</text>
    <text x="0" y="5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">🍎 macOS</text>
    <text x="140" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">🐧 Linux</text>
  </g>
</svg>