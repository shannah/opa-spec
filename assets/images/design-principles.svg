<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="420" fill="url(#bg)"/>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">Design Principles</text>
  <line x1="310" y1="50" x2="490" y2="50" stroke="url(#purple-glow)" stroke-width="2" opacity="0.6"/>

  <!-- Hexagonal grid of 6 principles -->
  <!-- Row 1: 3 items -->
  <!-- 1. Agent-agnostic -->
  <g transform="translate(170, 150)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#7c3aed" opacity="0.08"/>
    <text x="0" y="-15" text-anchor="middle" fill="#e2e8f0" font-size="22">🤖</text>
    <text x="0" y="6" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">Agent-</text>
    <text x="0" y="18" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">agnostic</text>
    <text x="0" y="35" text-anchor="middle" fill="#a78bfa" font-size="7">Any AI provider</text>
  </g>

  <!-- 2. Container-friendly -->
  <g transform="translate(400, 150)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#06b6d4" opacity="0.08"/>
    <text x="0" y="-15" text-anchor="middle" fill="#e2e8f0" font-size="22">🐳</text>
    <text x="0" y="6" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">Container-</text>
    <text x="0" y="18" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">friendly</text>
    <text x="0" y="35" text-anchor="middle" fill="#67e8f9" font-size="7">Sandbox ready</text>
  </g>

  <!-- 3. Human-readable -->
  <g transform="translate(630, 150)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#7c3aed" opacity="0.08"/>
    <text x="0" y="-15" text-anchor="middle" fill="#e2e8f0" font-size="22">👁️</text>
    <text x="0" y="6" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">Human-</text>
    <text x="0" y="18" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">readable</text>
    <text x="0" y="35" text-anchor="middle" fill="#a78bfa" font-size="7">Plain text formats</text>
  </g>

  <!-- Row 2: 3 items -->
  <!-- 4. Toolchain compatible -->
  <g transform="translate(170, 310)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#06b6d4" opacity="0.08"/>
    <text x="0" y="-15" text-anchor="middle" fill="#e2e8f0" font-size="22">🔧</text>
    <text x="0" y="6" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">Toolchain</text>
    <text x="0" y="18" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">compatible</text>
    <text x="0" y="35" text-anchor="middle" fill="#67e8f9" font-size="7">ZIP · JAR · 7-Zip</text>
  </g>

  <!-- 5. Extensible -->
  <g transform="translate(400, 310)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#7c3aed" opacity="0.08"/>
    <text x="0" y="-15" text-anchor="middle" fill="#e2e8f0" font-size="22">🔌</text>
    <text x="0" y="8" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">Extensible</text>
    <text x="0" y="35" text-anchor="middle" fill="#a78bfa" font-size="7">Forward compatible</text>
  </g>

  <!-- 6. Minimal -->
  <g transform="translate(630, 310)">
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <polygon points="0,-55 48,-27 48,27 0,55 -48,27 -48,-27" fill="#06b6d4" opacity="0.08"/>
    <text x="0" y="-15" text-anchor="middle" fill="#e2e8f0" font-size="22">✨</text>
    <text x="0" y="8" text-anchor="middle" fill="#e2e8f0" font-size="10" font-weight="700">Minimal</text>
    <text x="0" y="35" text-anchor="middle" fill="#67e8f9" font-size="7">Manifest + prompt</text>
  </g>

  <!-- Connecting lines between hexagons -->
  <g stroke="#7c3aed" stroke-width="0.8" opacity="0.15">
    <line x1="218" y1="150" x2="352" y2="150"/>
    <line x1="448" y1="150" x2="582" y2="150"/>
    <line x1="218" y1="310" x2="352" y2="310"/>
    <line x1="448" y1="310" x2="582" y2="310"/>
    <line x1="170" y1="205" x2="170" y2="255"/>
    <line x1="400" y1="205" x2="400" y2="255"/>
    <line x1="630" y1="205" x2="630" y2="255"/>
  </g>
</svg>