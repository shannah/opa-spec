<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#7c3aed">
    <line x1="0" y1="0" x2="800" y2="0" stroke-width="0.5"/>
    <line x1="0" y1="80" x2="800" y2="80" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="800" y2="400" stroke-width="0.5"/>
  </g>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">OPA Security Model</text>
  <line x1="300" y1="55" x2="500" y2="55" stroke="url(#purple-glow)" stroke-width="2" opacity="0.6"/>

  <!-- Central shield icon -->
  <g transform="translate(400, 135)" filter="url(#soft-glow)">
    <path d="M0,-45 L35,-30 L35,10 L0,45 L-35,10 L-35,-30 Z" fill="none" stroke="url(#purple-glow)" stroke-width="2.5" opacity="0.8"/>
    <path d="M0,-30 L22,-19 L22,7 L0,30 L-22,7 L-22,-19 Z" fill="#7c3aed" opacity="0.15"/>
    <text x="0" y="6" text-anchor="middle" fill="#e2e8f0" font-size="28">🔐</text>
  </g>

  <!-- Four security layers as connected nodes -->
  <!-- Layer 1: Path Safety -->
  <g transform="translate(120, 260)">
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#7c3aed" opacity="0.08"/>
    <text x="0" y="-8" text-anchor="middle" fill="#06b6d4" font-size="22">🛡️</text>
    <text x="0" y="12" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Path Safety</text>
    <text x="0" y="26" text-anchor="middle" fill="#94a3b8" font-size="9">Traversal prevention</text>
  </g>

  <!-- Layer 2: Signing -->
  <g transform="translate(320, 260)">
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#7c3aed" opacity="0.08"/>
    <text x="0" y="-8" text-anchor="middle" fill="#06b6d4" font-size="22">✍️</text>
    <text x="0" y="12" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Digital Signing</text>
    <text x="0" y="26" text-anchor="middle" fill="#94a3b8" font-size="9">SHA-256 / RSA / EC</text>
  </g>

  <!-- Layer 3: Verification -->
  <g transform="translate(520, 260)">
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#06b6d4" opacity="0.08"/>
    <text x="0" y="-8" text-anchor="middle" fill="#06b6d4" font-size="22">✅</text>
    <text x="0" y="12" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Verification</text>
    <text x="0" y="26" text-anchor="middle" fill="#94a3b8" font-size="9">Integrity &amp; provenance</text>
  </g>

  <!-- Layer 4: Sandboxing -->
  <g transform="translate(700, 260)">
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
    <rect x="-75" y="-35" width="150" height="70" rx="12" fill="#06b6d4" opacity="0.08"/>
    <text x="0" y="-8" text-anchor="middle" fill="#06b6d4" font-size="22">📦</text>
    <text x="0" y="12" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Sandboxing</text>
    <text x="0" y="26" text-anchor="middle" fill="#94a3b8" font-size="9">Container isolation</text>
  </g>

  <!-- Connecting lines from shield to layers -->
  <g stroke="#7c3aed" stroke-width="1" opacity="0.4">
    <line x1="380" y1="175" x2="120" y2="225"/>
    <line x1="395" y1="178" x2="320" y2="225"/>
    <line x1="405" y1="178" x2="520" y2="225"/>
    <line x1="420" y1="175" x2="700" y2="225"/>
  </g>

  <!-- Bottom bar: Trust + Resource Limits -->
  <g transform="translate(400, 365)">
    <rect x="-280" y="-18" width="560" height="36" rx="18" fill="#1e1530" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <text x="-160" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">🔑 Trust Store</text>
    <line x1="0" y1="-10" x2="0" y2="10" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <text x="0" y="5" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="600">⚡ Resource Limits</text>
    <line x1="140" y1="-10" x2="140" y2="10" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
    <text x="160" y="5" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="600">🚫 Injection Defense</text>
  </g>
</svg>