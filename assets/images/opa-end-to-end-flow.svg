<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 640" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <style>
    @keyframes dash{to{stroke-dashoffset:-20}}
    @keyframes glow{0%,100%{filter:drop-shadow(0 0 2px rgba(124,58,237,.2))}50%{filter:drop-shadow(0 0 6px rgba(124,58,237,.5))}}
    @keyframes glow-c{0%,100%{filter:drop-shadow(0 0 2px rgba(6,182,212,.2))}50%{filter:drop-shadow(0 0 6px rgba(6,182,212,.5))}}
    @keyframes packet-h{0%,100%{opacity:0}15%,85%{opacity:1}}
    .flow-line{stroke-dasharray:6 4;animation:dash 1.2s linear infinite}
    .glow-p{animation:glow 3s ease-in-out infinite}
    .glow-c{animation:glow-c 3s ease-in-out infinite}
    .dot-1{animation:packet-h 2.5s ease-in-out infinite}
    .dot-2{animation:packet-h 2.5s .8s ease-in-out infinite}
    .dot-3{animation:packet-h 2.5s 1.6s ease-in-out infinite}
  </style>

  <defs>
    <linearGradient id="ef-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/><stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="ef-purp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/><stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="ef-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="ef-a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7c3aed" opacity=".7"/>
    </marker>
    <marker id="ef-ac" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#06b6d4" opacity=".7"/>
    </marker>
    <marker id="ef-ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981" opacity=".7"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="880" height="640" fill="url(#ef-bg)"/>
  <g opacity=".03" stroke="#7c3aed" stroke-width=".5">
    <line x1="0" y1="100" x2="880" y2="100"/><line x1="0" y1="200" x2="880" y2="200"/>
    <line x1="0" y1="300" x2="880" y2="300"/><line x1="0" y1="400" x2="880" y2="400"/>
    <line x1="0" y1="500" x2="880" y2="500"/><line x1="0" y1="600" x2="880" y2="600"/>
  </g>

  <!-- ═══ TITLE ═══ -->
  <text x="440" y="34" text-anchor="middle" fill="#e2e8f0" font-size="18" font-weight="700" letter-spacing="1">How OPA Bridges Server Intelligence &amp; User Context</text>
  <line x1="220" y1="44" x2="660" y2="44" stroke="url(#ef-purp)" stroke-width="2" opacity=".5"/>

  <!-- ═══ SERVER SIDE zone ═══ -->
  <rect x="20" y="58" width="520" height="22" rx="11" fill="#7c3aed" opacity=".12"/>
  <text x="280" y="73" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600" letter-spacing="1.5">SERVER SIDE</text>

  <!-- ── 1  User Request ── -->
  <g transform="translate(95,165)">
    <rect x="-70" y="-55" width="140" height="110" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-22" text-anchor="middle" fill="#e2e8f0" font-size="26">👤</text>
    <text x="0" y="2"  text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="700">User Request</text>
    <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="8">"Analyze inventory</text>
    <text x="0" y="27" text-anchor="middle" fill="#94a3b8" font-size="8">for March 15"</text>
    <text x="0" y="42" text-anchor="middle" fill="#a78bfa" font-size="8">via web app</text>
  </g>

  <!-- arrow 1→2 -->
  <line x1="170" y1="165" x2="218" y2="165" stroke="#7c3aed" stroke-width="1.5" class="flow-line" marker-end="url(#ef-a)"/>
  <circle cx="195" cy="165" r="3.5" fill="#a78bfa" class="dot-1"/>

  <!-- ── 2  Web Application ── -->
  <g transform="translate(310,165)">
    <rect x="-80" y="-70" width="160" height="140" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <rect x="-80" y="-70" width="160" height="140" rx="12" fill="#7c3aed" opacity=".05"/>
    <text x="0" y="-40" text-anchor="middle" fill="#e2e8f0" font-size="22">🖥️</text>
    <text x="0" y="-22" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="700">Web Application</text>
    <!-- data source chips -->
    <rect x="-68" y="-8" width="62" height="20" rx="4" fill="rgba(124,58,237,.15)" stroke="#7c3aed" stroke-width=".6"/>
    <text x="-37" y="6" text-anchor="middle" fill="#a78bfa" font-size="7" font-weight="600">📊 DB</text>
    <rect x="0" y="-8" width="68" height="20" rx="4" fill="rgba(124,58,237,.15)" stroke="#7c3aed" stroke-width=".6"/>
    <text x="34" y="6" text-anchor="middle" fill="#a78bfa" font-size="7" font-weight="600">📁 Files</text>
    <rect x="-68" y="18" width="62" height="20" rx="4" fill="rgba(124,58,237,.15)" stroke="#7c3aed" stroke-width=".6"/>
    <text x="-37" y="32" text-anchor="middle" fill="#a78bfa" font-size="7" font-weight="600">🔌 APIs</text>
    <rect x="0" y="18" width="68" height="20" rx="4" fill="rgba(124,58,237,.15)" stroke="#7c3aed" stroke-width=".6"/>
    <text x="34" y="32" text-anchor="middle" fill="#a78bfa" font-size="7" font-weight="600">📋 Config</text>
    <text x="0" y="56" text-anchor="middle" fill="#94a3b8" font-size="7">Gathers data + builds prompt</text>
  </g>

  <!-- arrow 2→3 -->
  <line x1="395" y1="165" x2="450" y2="165" stroke="#7c3aed" stroke-width="1.5" class="flow-line" marker-end="url(#ef-a)"/>
  <circle cx="423" cy="165" r="3.5" fill="#a78bfa" class="dot-2"/>

  <!-- ── 3  .opa file ── -->
  <g class="glow-p" transform="translate(520,165)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1e1530" stroke="url(#ef-purp)" stroke-width="2"/>
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#7c3aed" opacity=".08"/>
    <text x="0" y="-22" text-anchor="middle" fill="#e2e8f0" font-size="28">📦</text>
    <text x="0" y="2"  text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">.opa</text>
    <text x="0" y="16" text-anchor="middle" fill="#a78bfa" font-size="8">prompt.md</text>
    <text x="0" y="28" text-anchor="middle" fill="#a78bfa" font-size="8">data/*.json</text>
    <text x="0" y="40" text-anchor="middle" fill="#a78bfa" font-size="8">MANIFEST.MF</text>
  </g>

  <!-- ── Server callout (right of row 1) ── -->
  <g transform="translate(730,145)">
    <rect x="-110" y="-52" width="220" height="104" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1" opacity=".8"/>
    <text x="0" y="-32" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="700" letter-spacing=".8">SERVER DOES WHAT IT</text>
    <text x="0" y="-20" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="700" letter-spacing=".8">DOES BEST</text>
    <text x="0" y="-2" text-anchor="middle" fill="#94a3b8" font-size="8">✓  Gathers data from its sources</text>
    <text x="0" y="12" text-anchor="middle" fill="#94a3b8" font-size="8">✓  Crafts expert analysis prompt</text>
    <text x="0" y="26" text-anchor="middle" fill="#94a3b8" font-size="8">✓  Bundles into portable .opa</text>
    <text x="0" y="42" text-anchor="middle" fill="#ef4444" font-size="8" font-weight="600">✗  Zero LLM cost incurred</text>
  </g>
  <!-- connecting line from .opa to callout -->
  <line x1="578" y1="145" x2="618" y2="145" stroke="#7c3aed" stroke-width=".8" opacity=".3" stroke-dasharray="3 3"/>

  <!-- ═══ DOWNLOAD arrow (vertical) ═══ -->
  <line x1="520" y1="225" x2="520" y2="300" stroke="#06b6d4" stroke-width="2" class="flow-line" marker-end="url(#ef-ac)"/>
  <text x="540" y="268" fill="#67e8f9" font-size="9" font-weight="600">Download</text>
  <circle cx="520" cy="262" r="3.5" fill="#22d3ee" class="dot-3"/>

  <!-- ═══ USER SIDE zone ═══ -->
  <rect x="20" y="308" width="840" height="22" rx="11" fill="#06b6d4" opacity=".1"/>
  <text x="440" y="323" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600" letter-spacing="1.5">USER SIDE — runs locally, user's own AI, user's own data</text>

  <!-- ═══ OPA RUNNER outer box ═══ -->
  <rect x="35" y="340" width="810" height="250" rx="14" fill="#0d1520" stroke="#06b6d4" stroke-width="1.5" opacity=".9"/>
  <rect x="35" y="340" width="810" height="250" rx="14" fill="#06b6d4" opacity=".03"/>
  <text x="440" y="360" text-anchor="middle" fill="#67e8f9" font-size="10" font-weight="700" letter-spacing="1">🖥️  OPA RUNNER</text>

  <!-- ── Sandbox Container ── -->
  <rect x="55" y="372" width="470" height="200" rx="10" fill="#111827" stroke="#7c3aed" stroke-width="1" stroke-dasharray="5 3" opacity=".9"/>
  <text x="290" y="390" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600" letter-spacing="1">🐳  SANDBOX CONTAINER  (Docker / Podman)</text>

  <!-- profile chips -->
  <rect x="70" y="398" width="145" height="18" rx="3" fill="rgba(124,58,237,.12)" stroke="#7c3aed" stroke-width=".5"/>
  <text x="142" y="410" text-anchor="middle" fill="#a78bfa" font-size="6.5">ENV: OPA_VERSION, OPA_DATA_ROOT …</text>
  <rect x="222" y="398" width="110" height="18" rx="3" fill="rgba(124,58,237,.12)" stroke="#7c3aed" stroke-width=".5"/>
  <text x="277" y="410" text-anchor="middle" fill="#a78bfa" font-size="6.5">🔌 Allowed MCPs only</text>
  <rect x="340" y="398" width="95" height="18" rx="3" fill="rgba(124,58,237,.12)" stroke="#7c3aed" stroke-width=".5"/>
  <text x="387" y="410" text-anchor="middle" fill="#a78bfa" font-size="6.5">🔒 Security profile</text>

  <!-- AI Agent -->
  <g transform="translate(170,488)">
    <rect x="-80" y="-48" width="160" height="96" rx="10" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-18" text-anchor="middle" fill="#e2e8f0" font-size="22">🤖</text>
    <text x="0" y="2"  text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="700">AI Agent</text>
    <text x="0" y="16" text-anchor="middle" fill="#67e8f9" font-size="8">User's own model / API key</text>
    <text x="0" y="30" text-anchor="middle" fill="#94a3b8" font-size="7">Claude, GPT, Llama, Gemini …</text>
  </g>

  <!-- Prompt + Data box -->
  <g transform="translate(400,478)">
    <rect x="-55" y="-38" width="110" height="76" rx="8" fill="#1e1530" stroke="#7c3aed" stroke-width="1"/>
    <text x="0" y="-16" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">📝 prompt.md</text>
    <text x="0" y="0"  text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">📊 data/*.json</text>
    <text x="0" y="14" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">📋 MANIFEST.MF</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="7">From .opa archive</text>
  </g>

  <!-- arrow: data → agent -->
  <line x1="342" y1="478" x2="255" y2="478" stroke="#7c3aed" stroke-width="1.2" opacity=".5" marker-end="url(#ef-a)"/>

  <!-- ═══ USER'S OWN CONTEXT (right, overlapping sandbox boundary) ═══ -->
  <g class="glow-c">
    <rect x="545" y="378" width="285" height="195" rx="10" fill="#0a1628" stroke="#10b981" stroke-width="1.5"/>
    <rect x="545" y="378" width="285" height="195" rx="10" fill="#10b981" opacity=".04"/>
  </g>
  <text x="687" y="398" text-anchor="middle" fill="#34d399" font-size="9" font-weight="700" letter-spacing="1">👤 USER'S OWN CONTEXT</text>

  <!-- MCP Servers -->
  <rect x="558" y="410" width="128" height="42" rx="5" fill="rgba(16,185,129,.1)" stroke="#10b981" stroke-width=".7"/>
  <text x="622" y="428" text-anchor="middle" fill="#34d399" font-size="8" font-weight="600">🔌 MCP Servers</text>
  <text x="622" y="440" text-anchor="middle" fill="#94a3b8" font-size="7">Slack, Jira, GitHub …</text>

  <!-- Local Files -->
  <rect x="694" y="410" width="122" height="42" rx="5" fill="rgba(16,185,129,.1)" stroke="#10b981" stroke-width=".7"/>
  <text x="755" y="428" text-anchor="middle" fill="#34d399" font-size="8" font-weight="600">💾 Local Files</text>
  <text x="755" y="440" text-anchor="middle" fill="#94a3b8" font-size="7">Private docs, notes</text>

  <!-- Enterprise APIs -->
  <rect x="558" y="458" width="128" height="42" rx="5" fill="rgba(16,185,129,.1)" stroke="#10b981" stroke-width=".7"/>
  <text x="622" y="476" text-anchor="middle" fill="#34d399" font-size="8" font-weight="600">🏢 Enterprise APIs</text>
  <text x="622" y="488" text-anchor="middle" fill="#94a3b8" font-size="7">Internal services</text>

  <!-- Domain Knowledge -->
  <rect x="694" y="458" width="122" height="42" rx="5" fill="rgba(16,185,129,.1)" stroke="#10b981" stroke-width=".7"/>
  <text x="755" y="476" text-anchor="middle" fill="#34d399" font-size="8" font-weight="600">🧠 Knowledge</text>
  <text x="755" y="488" text-anchor="middle" fill="#94a3b8" font-size="7">Domain expertise</text>

  <!-- Model Choice -->
  <rect x="558" y="506" width="258" height="28" rx="5" fill="rgba(16,185,129,.08)" stroke="#10b981" stroke-width=".5"/>
  <text x="687" y="524" text-anchor="middle" fill="#10b981" font-size="7" font-weight="600">⚠️  Server has NO access to these resources — only the user does</text>

  <!-- arrow: user context → agent (enters sandbox) -->
  <line x1="545" y1="468" x2="530" y2="468" stroke="#10b981" stroke-width="1.5" class="flow-line" marker-end="url(#ef-ag)"/>
  <!-- arrow continues into sandbox to agent -->
  <line x1="530" y1="468" x2="530" y2="488" stroke="#10b981" stroke-width="1" opacity=".3"/>
  <line x1="530" y1="488" x2="255" y2="488" stroke="#10b981" stroke-width="1" opacity=".3" marker-end="url(#ef-ag)"/>

  <!-- ═══ BOTTOM BENEFITS BAR ═══ -->
  <g transform="translate(440,618)">
    <rect x="-405" y="-16" width="810" height="32" rx="16" fill="#1e1530" stroke="url(#ef-purp)" stroke-width="1" opacity=".5"/>
    <text x="-290" y="4" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">💰 Zero server AI cost</text>
    <text x="-130" y="4" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">🤖 User picks their model</text>
    <text x="30"  y="4" text-anchor="middle" fill="#34d399" font-size="9" font-weight="600">🔌 User's MCPs &amp; data</text>
    <text x="180" y="4" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">🔒 Data stays local</text>
    <text x="330" y="4" text-anchor="middle" fill="#67e8f9" font-size="9" font-weight="600">📦 Portable &amp; reproducible</text>
  </g>
</svg>