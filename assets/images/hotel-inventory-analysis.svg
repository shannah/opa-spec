<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="hi-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#1a1025"/>
    </linearGradient>
    <linearGradient id="hi-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="hi-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <marker id="hi-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7c3aed" opacity="0.7"/>
    </marker>
    <marker id="hi-arr-c" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#06b6d4" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="800" height="380" fill="url(#hi-bg)"/>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="1">Hotel Inventory Analysis Flow</text>
  <line x1="250" y1="48" x2="550" y2="48" stroke="url(#hi-purple)" stroke-width="2" opacity="0.6"/>

  <!-- Step 1: Inspector UI -->
  <g transform="translate(90, 155)">
    <rect x="-65" y="-55" width="130" height="110" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-22" text-anchor="middle" fill="#e2e8f0" font-size="26">🏨</text>
    <text x="0" y="2" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">Inspector UI</text>
    <text x="0" y="16" text-anchor="middle" fill="#94a3b8" font-size="8">Room availability</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="8">Discrepancy found!</text>
    <text x="0" y="42" text-anchor="middle" fill="#a78bfa" font-size="9" font-weight="600">[ Analyze ]</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="160" y1="155" x2="205" y2="155" stroke="#7c3aed" stroke-width="1.5" opacity="0.5" marker-end="url(#hi-arr)"/>

  <!-- Step 2: OPA Generated -->
  <g transform="translate(270, 155)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1e1530" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="0" y="-22" text-anchor="middle" fill="#e2e8f0" font-size="26">📦</text>
    <text x="0" y="2" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">OPA Created</text>
    <text x="0" y="18" text-anchor="middle" fill="#94a3b8" font-size="7">inventory.json</text>
    <text x="0" y="28" text-anchor="middle" fill="#94a3b8" font-size="7">bookings.json</text>
    <text x="0" y="38" text-anchor="middle" fill="#94a3b8" font-size="7">+ analysis prompt</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="330" y1="155" x2="375" y2="155" stroke="#7c3aed" stroke-width="1.5" opacity="0.5" marker-end="url(#hi-arr)"/>
  <text x="353" y="143" text-anchor="middle" fill="#94a3b8" font-size="7">download</text>

  <!-- Step 3: User opens in Runner -->
  <g transform="translate(435, 155)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-22" text-anchor="middle" fill="#e2e8f0" font-size="26">🖥️</text>
    <text x="0" y="2" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">OPA Runner</text>
    <text x="0" y="18" text-anchor="middle" fill="#67e8f9" font-size="8">Double-click to open</text>
    <text x="0" y="30" text-anchor="middle" fill="#94a3b8" font-size="8">Hotel manager's PC</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="495" y1="155" x2="540" y2="155" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" marker-end="url(#hi-arr-c)"/>

  <!-- Step 4: AI Analyzes -->
  <g transform="translate(600, 155)">
    <rect x="-55" y="-55" width="110" height="110" rx="12" fill="#1e1530" stroke="#06b6d4" stroke-width="1.5"/>
    <text x="0" y="-22" text-anchor="middle" fill="#e2e8f0" font-size="26">🤖</text>
    <text x="0" y="2" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">AI Analyzes</text>
    <text x="0" y="18" text-anchor="middle" fill="#67e8f9" font-size="8">Reconciles inventory</text>
    <text x="0" y="30" text-anchor="middle" fill="#94a3b8" font-size="8">Flags anomalies</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="660" y1="155" x2="700" y2="155" stroke="#06b6d4" stroke-width="1.5" opacity="0.5" marker-end="url(#hi-arr-c)"/>

  <!-- Step 5: Report -->
  <g transform="translate(745, 155)">
    <rect x="-40" y="-55" width="80" height="110" rx="12" fill="#1e1530" stroke="#10b981" stroke-width="1.5"/>
    <text x="0" y="-18" text-anchor="middle" fill="#e2e8f0" font-size="26">📋</text>
    <text x="0" y="6" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">Report</text>
    <text x="0" y="20" text-anchor="middle" fill="#94a3b8" font-size="7">Root cause</text>
    <text x="0" y="30" text-anchor="middle" fill="#94a3b8" font-size="7">identified</text>
  </g>

  <!-- Data files illustration below -->
  <g transform="translate(270, 310)">
    <rect x="-220" y="-22" width="440" height="44" rx="10" fill="#1e1530" stroke="#7c3aed" stroke-width="1" opacity="0.4"/>
    <text x="-160" y="4" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">📊 inventory.json</text>
    <text x="-55" y="4" text-anchor="middle" fill="#67e8f9" font-size="8" font-weight="600">📅 bookings.json</text>
    <text x="50" y="4" text-anchor="middle" fill="#a78bfa" font-size="8" font-weight="600">🏢 blocks.json</text>
    <text x="155" y="4" text-anchor="middle" fill="#67e8f9" font-size="8" font-weight="600">🔧 out-of-service.json</text>
  </g>

  <!-- Zero cost badge -->
  <g transform="translate(660, 310)">
    <rect x="-80" y="-15" width="160" height="30" rx="15" fill="#1e1530" stroke="#10b981" stroke-width="1" opacity="0.6"/>
    <text x="0" y="4" text-anchor="middle" fill="#10b981" font-size="10" font-weight="600">$0 server cost per analysis</text>
  </g>
</svg>